site_name: PipeScope
site_description: Universal static analyzer for data pipelines (SQL, dbt, Airflow, Spark, contracts).
# GitHub Pages uses /PipeScope/; MkDocs mirrors that in `mkdocs serve` (not stuck—server runs until Ctrl+C).
# For a local root URL (http://127.0.0.1:8000/), set PIPESCOPE_DOCS_SITE_URL=http://127.0.0.1:8000/
site_url: !ENV [PIPESCOPE_DOCS_SITE_URL, 'https://kirannarayanak.github.io/PipeScope/']
repo_url: https://github.com/kirannarayanak/PipeScope
repo_name: kirannarayanak/PipeScope
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Plus Jakarta Sans
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kirannarayanak/PipeScope
      name: GitHub

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Analyzers reference: analyzers.md
  - CI/CD integration: ci-cd.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - md_in_html
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      check_paths: true
      base_path:
        - .
        - docs
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

plugins:
  - search

# Keep demo assets out of the nav (still copied as static files under /demo/).
exclude_docs: |
  demo/README.md
