name: LineageScope
author: Kiran Narayana
description: >
  Run LineageScope in CI: static analysis for SQL, dbt, Airflow, Spark, and ODCS
  contracts—lineage, quality scores, GitHub Actions annotations, and configurable
  pass/fail thresholds via lineagescope ci.
branding:
  icon: git-branch
  color: blue
inputs:
  path:
    default: "."
    description: Path to scan
  threshold:
    default: "0"
    description: Min score to pass
  dialect:
    default: ""
    description: SQL dialect
  exclude:
    default: ""
    description: Comma-separated directory names to skip (e.g. node_modules,venv)
runs:
  using: composite
  steps:
    - name: Install LineageScope
      shell: bash
      run: pip install lineagescope
    - name: Run LineageScope CI gate
      shell: bash
      run: |
        EX=()
        if [ -n "${{ inputs.exclude }}" ]; then
          EX=(--exclude "${{ inputs.exclude }}")
        fi
        if [ -n "${{ inputs.dialect }}" ]; then
          lineagescope ci --threshold "${{ inputs.threshold }}" --path "${{ inputs.path }}" --dialect "${{ inputs.dialect }}" "${EX[@]}"
        else
          lineagescope ci --threshold "${{ inputs.threshold }}" --path "${{ inputs.path }}" "${EX[@]}"
        fi
