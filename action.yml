name: PipeScope
description: Static analysis for data pipelines
inputs:
  path:
    default: "."
    description: Path to scan
  threshold:
    default: "0"
    description: Min score to pass
  dialect:
    default: ""
    description: SQL dialect
  exclude:
    default: ""
    description: Comma-separated directory names to skip (e.g. node_modules,venv)
runs:
  using: composite
  steps:
    - name: Install PipeScope
      shell: bash
      run: pip install pipescope
    - name: Run PipeScope CI gate
      shell: bash
      run: |
        EX=()
        if [ -n "${{ inputs.exclude }}" ]; then
          EX=(--exclude "${{ inputs.exclude }}")
        fi
        if [ -n "${{ inputs.dialect }}" ]; then
          pipescope ci --threshold "${{ inputs.threshold }}" --path "${{ inputs.path }}" --dialect "${{ inputs.dialect }}" "${EX[@]}"
        else
          pipescope ci --threshold "${{ inputs.threshold }}" --path "${{ inputs.path }}" "${EX[@]}"
        fi
